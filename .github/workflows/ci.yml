name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install flake8 black isort
      - name: Lint
        run: flake8 src/ tests/ --max-line-length 120 --ignore E501,W503
      - name: Check formatting
        run: black --check --line-length 100 src/ tests/
      - name: Check imports
        run: isort --check --profile black --line-length 100 src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate test data
        run: python data/synthetic/generate_data.py
      - name: Run unit tests
        run: pytest tests/ -v --tb=short -m "not integration"
      - name: Run integration tests
        run: pytest tests/ -v --tb=short -m "integration"

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python data/synthetic/generate_data.py
      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing
      - name: Check coverage threshold
        run: |
          coverage report --fail-under=65
